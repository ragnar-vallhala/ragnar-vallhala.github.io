<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" font-size="11">
<style>
  :root{
    --bg:#f6f2e9; --grid:#d8d0bf; --ink:#211e1a; --soft:#5a554c;
    --faint:#8a8478; --accent:#b4451f; --slate:#3f6b86; --attain:#211e1a;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#1a1815; --grid:#38332c; --ink:#ece4d4; --soft:#b3aa98;
    --faint:#7c7568; --accent:#e07a4e; --slate:#8fb4c8; --attain:#ece4d4;
  }}
  .bg{fill:var(--bg)} .grid{stroke:var(--grid);stroke-width:1}
  .ttl{fill:var(--ink);font-weight:700} .ax{fill:var(--ink)}
  .tk{fill:var(--soft)} .cap{fill:var(--soft)}
  .roof1{stroke:var(--accent);stroke-width:2.2;fill:none}
  .roof4{stroke:var(--slate);stroke-width:2.2;fill:none;stroke-dasharray:6 4}
  .base{fill:var(--faint)} .att{fill:var(--attain)}
  .lbl{fill:var(--ink)} .lead{stroke:var(--faint);stroke-width:0.8}
  text{font-family:'Spline Sans Mono',ui-monospace,monospace}
</style>
