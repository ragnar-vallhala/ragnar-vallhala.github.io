<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" font-size="11">
<style>
  :root{--bg:#f6f2e9;--grid:#d8d0bf;--ink:#211e1a;--soft:#5a554c;--faint:#8a8478;--accent:#b4451f;--slate:#3f6b86;}
  @media (prefers-color-scheme:dark){:root{--bg:#1a1815;--grid:#38332c;--ink:#ece4d4;--soft:#b3aa98;--faint:#7c7568;--accent:#e07a4e;--slate:#8fb4c8;}}
  .bg{fill:var(--bg)} .grid{stroke:var(--grid);stroke-width:1}
  .ttl{fill:var(--ink);font-weight:700} .ax{fill:var(--ink)} .tk{fill:var(--soft)} .cap{fill:var(--soft)}
  .arm{fill:var(--accent)} .rv{fill:var(--slate)} .avr{fill:var(--faint)}
  .armS{stroke:var(--accent);stroke-width:2.2;fill:none} .rvS{stroke:var(--slate);stroke-width:2.2;fill:none}
  .roof{stroke:var(--ink);stroke-width:1.6;fill:none;stroke-dasharray:5 4}
  .lbl{fill:var(--ink)} text{font-family:'Spline Sans Mono',ui-monospace,monospace}
</style>
