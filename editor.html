<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Composer — write posts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- reuse the real site styles so the canvas IS the final look -->
  <link rel="stylesheet" href="src/styles.css" />
  <style>
    /* ── editor chrome (kept separate from the site's prose styles) ── */
    body { margin: 0; }
    .grain { display: none; } /* no texture while writing */

    .bar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      padding: 0.9rem 1.4rem;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
    }
    .bar h1 {
      font-family: var(--serif); font-weight: 600; font-size: 1.2rem;
      margin: 0; letter-spacing: -0.01em;
    }
    .bar h1 .dot { color: var(--accent); }
    .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    button {
      font-family: var(--mono); font-size: 0.76rem;
      color: var(--ink); background: var(--paper-2);
      border: 1px solid var(--rule); border-radius: 5px;
      padding: 0.4rem 0.7rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { background: var(--accent); color: var(--paper); border-color: var(--accent); }
    button.primary:hover { background: var(--accent-2); color: var(--paper); }

    .wrap { width: min(100% - 2.8rem, 56rem); margin: 0 auto; }

    /* frontmatter form */
    .fm {
      display: grid; gap: 0.9rem 1.4rem;
      grid-template-columns: repeat(2, 1fr);
      padding: 1.6rem 0 1.2rem;
    }
    .fm .full { grid-column: 1 / -1; }
    .fm label {
      display: block;
      font-family: var(--mono); font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--ink-soft); margin-bottom: 0.35rem;
    }
    .fm input, .fm select {
      width: 100%; box-sizing: border-box;
      font-family: var(--body); font-size: 1rem; color: var(--ink);
      background: var(--paper-2); border: 1px solid var(--rule);
      border-radius: 5px; padding: 0.5rem 0.7rem;
    }
    .fm input:focus, .fm select:focus { outline: none; border-color: var(--accent); }
    .fm .row-inline { display: flex; align-items: center; gap: 0.5rem; }
    .fm .row-inline input[type=checkbox] { width: auto; }
    .fm .filename {
      font-family: var(--mono); font-size: 0.72rem; color: var(--ink-faint);
    }
    .fm .filename b { color: var(--ink-soft); font-weight: 500; }

    /* toolbar */
    .toolbar {
      position: sticky; top: 56px; z-index: 15;
      display: flex; flex-wrap: wrap; gap: 0.35rem;
      padding: 0.6rem 0; margin-bottom: 0.4rem;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .toolbar .sep { width: 1px; background: var(--rule); margin: 0 0.3rem; }
    .toolbar button { min-width: 2rem; }

    /* writing canvas — borrows .post/.prose from the site stylesheet */
    .canvas { padding: 1.4rem 0 5rem; }
    .prose[contenteditable] { min-height: 55vh; outline: none; }
    .prose[contenteditable]:empty::before {
      content: "Start writing…"; color: var(--ink-faint); font-style: italic;
    }
    .prose[contenteditable]:focus-within { }

    /* markdown output */
    .md-panel { border-top: 1px solid var(--rule); margin-top: 2rem; }
    .md-panel summary {
      font-family: var(--mono); font-size: 0.76rem; color: var(--ink-soft);
      cursor: pointer; padding: 1rem 0; letter-spacing: 0.04em;
    }
    .md-panel pre {
      font-family: var(--mono); font-size: 0.82rem; line-height: 1.55;
      background: var(--code-bg); color: var(--code-fg);
      padding: 1.2rem 1.4rem; border-radius: 6px; overflow-x: auto;
      white-space: pre-wrap; word-break: break-word;
    }
    .toast {
      position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--paper);
      font-family: var(--mono); font-size: 0.8rem;
      padding: 0.6rem 1rem; border-radius: 6px;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="bar">
    <h1>Composer<span class="dot">.</span></h1>
    <div class="actions">
      <button id="btn-copy">Copy Markdown</button>
      <button id="btn-download">Download .md</button>
      <button id="btn-save" class="primary">Save to content/</button>
    </div>
  </div>

  <div class="wrap">
    <!-- frontmatter -->
    <div class="fm">
      <div>
        <label for="f-section">Section</label>
        <select id="f-section">
          <option value="engineering">Engineering</option>
          <option value="essays">Essays</option>
        </select>
      </div>
      <div>
        <label for="f-date">Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="full">
        <label for="f-title">Title</label>
        <input type="text" id="f-title" placeholder="The title of your piece" />
      </div>
      <div class="full">
        <label for="f-desc">Description</label>
        <input type="text" id="f-desc" placeholder="One-line summary for previews" />
      </div>
      <div>
        <label for="f-tags">Tags (comma-separated)</label>
        <input type="text" id="f-tags" placeholder="philosophy, politics" />
      </div>
      <div>
        <label>&nbsp;</label>
        <div class="row-inline">
          <input type="checkbox" id="f-draft" />
          <label for="f-draft" style="margin:0;text-transform:none;letter-spacing:0">Draft (hidden from site)</label>
        </div>
      </div>
      <div class="full filename">Saves as <b id="filename">engineering/untitled.md</b></div>
    </div>

    <!-- formatting toolbar -->
    <div class="toolbar" id="toolbar">
      <button data-block="P" title="Paragraph">¶</button>
      <button data-block="H2" title="Heading 2">H2</button>
      <button data-block="H3" title="Heading 3">H3</button>
      <button data-block="H4" title="Heading 4">H4</button>
      <span class="sep"></span>
      <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-cmd="italic" title="Italic (Ctrl+I)"><i>i</i></button>
      <button data-action="code" title="Inline code">&lt;/&gt;</button>
      <button data-action="link" title="Link (Ctrl+K)">link</button>
      <span class="sep"></span>
      <button data-cmd="insertUnorderedList" title="Bullet list">• list</button>
      <button data-cmd="insertOrderedList" title="Numbered list">1. list</button>
      <button data-block="BLOCKQUOTE" title="Quote">&ldquo; quote</button>
      <button data-action="codeblock" title="Code block">{ }</button>
      <button data-action="hr" title="Divider">— hr</button>
      <span class="sep"></span>
      <button data-action="image" title="Insert image">image</button>
      <button data-action="table" title="Insert table">table</button>
    </div>

    <!-- the canvas: same classes the site uses, so this is WYSIWYG -->
    <div class="canvas">
      <article class="post">
        <div class="prose" id="canvas" contenteditable="true" spellcheck="true"></div>
      </article>
    </div>

    <details class="md-panel">
      <summary>Generated Markdown ▾</summary>
      <pre id="md-out"></pre>
    </details>
  </div>

  <div class="toast" id="toast"></div>

  <script src="editor.js"></script>
</body>
</html>
